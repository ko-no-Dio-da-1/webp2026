<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景點觀光展覽資訊 - HW#4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background: #f8f9fa; }
        h1 { color: #d32f2f; }
        #search { width: 300px; }
        table { margin-top: 20px; }
        .pagination-info { font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🌟 景點觀光展覽資訊 - HW#4</h1>
        
        <!-- 搜尋框 -->
        <div class="text-center mb-3">
            <input type="text" id="search" class="form-control d-inline-block" 
                   placeholder="🔍 輸入展覽名稱關鍵字搜尋..." 
                   oninput="handleSearch()">
        </div>

        <!-- 表格 -->
        <table id="myTable" class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>名稱</th>
                    <th>地點</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- 分頁控制 -->
        <div class="text-center mt-4">
            <button onclick="prevPage()" class="btn btn-outline-primary mx-2">⬅️ 上一頁</button>
            <span id="pageInfo" class="pagination-info mx-3">第 1 / 1 頁</span>
            <button onclick="nextPage()" class="btn btn-outline-primary mx-2">下一頁 ➡️</button>
        </div>
    </div>

    <script>
        // 全域變數
        let allData = [];      // 從 API 抓回來的原始資料
        let filteredData = []; // 搜尋後的資料
        let currentPage = 1;
        const pageSize = 10;   // 每頁 10 筆

        const tableBody = document.querySelector('#myTable tbody');
        const pageInfo = document.getElementById('pageInfo');

        // ==================== Ajax 抓資料 ====================
        const openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

        const xhr = new XMLHttpRequest();
        xhr.open('GET', openUrl, true);
        xhr.send();

        xhr.onreadystatechange = function () {
            if (this.readyState === 4 && this.status === 200) {
                allData = JSON.parse(this.responseText);
                filteredData = [...allData];   // 一開始全部顯示
                renderTable();
            }
        };

        // ==================== 渲染表格 ====================
        function renderTable() {
            tableBody.innerHTML = '';   // 清空表格

            // 計算本頁要顯示的範圍
            const start = (currentPage - 1) * pageSize;
            const end = Math.min(start + pageSize, filteredData.length);

            for (let i = start; i < end; i++) {
                const item = filteredData[i];
                const row = tableBody.insertRow();

                // 名稱
                const title = item.title || '未提供名稱';
                row.insertCell(0).innerHTML = title;

                // 地點（防錯）
                let location = '未提供';
                if (item.showInfo && item.showInfo[0] && item.showInfo[0].location) {
                    location = item.showInfo[0].location;
                }
                row.insertCell(1).innerHTML = location;
            }

            // 更新頁碼顯示
            const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 頁`;
        }

        // ==================== 分頁功能 ====================
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        // ==================== 搜尋功能（oninput = onchange） ====================
        function handleSearch() {
            const keyword = document.getElementById('search').value.trim().toLowerCase();

            if (keyword === '') {
                filteredData = [...allData];
            } else {
                filteredData = allData.filter(item => 
                    item.title && item.title.toLowerCase().includes(keyword)
                );
            }

            currentPage = 1;        // 搜尋後回到第一頁
            renderTable();
        }
    </script>
</body>
</html>
