<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HW2 - 資工選課表</title>
    <style>
        /* CSS 對應簡報 page 41 */
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #ddd;
        }
        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }
        button {
            margin-top: 10px;
            padding: 5px 15px;
            cursor: pointer;
        }
        
        /* 讓有連結的文字變成藍色加底線，滑鼠移過去會變手指 */
        .popover-link {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table id="csie">
        <tr>
            <th>開課單位</th>
            <th>課程名稱</th>
            <th>授課教師</th>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 簡報有給真實代碼 A2337 -->
            <td><span class="popover-link" onclick="openPopover('A2337')">物件導向軟體設計</span></td>
            <td>黃崇源</td>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 需自行替換課號 -->
            <td><span class="popover-link" onclick="openPopover('61602')">計算機網路實驗</span></td>
            <td>李春良</td>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 需自行替換課號 -->
            <td><span class="popover-link" onclick="openPopover('A2338')">作業系統實務</span></td>
            <td>張哲維</td>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 需自行替換課號 -->
            <td><span class="popover-link" onclick="openPopover('58707')">生物統計</span></td>
            <td>陳光武</td>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 需自行替換課號 -->
            <td><span class="popover-link" onclick="openPopover('A2339')">通訊系統</span></td>
            <td>陳仁暉</td>
        </tr>
        <tr>
            <td>資工系</td>
            <!-- 需自行替換課號 -->
            <td><span class="popover-link" onclick="openPopover('56665')">軟硬體專題(2)</span></td>
            <td>魏志達</td>
        </tr>
    </table>

    <button onclick="changeResult()">Change</button>

    <script>
        // 對應簡報 P.80：只替換第一列 (rows[1]) 的老師為「李春良」
        function changeResult() {
            var myTable = document.getElementById("csie");
            myTable.rows[1].cells[2].innerHTML = "李春良";
        }

        // 統一處理彈出視窗，並把 sectionId 變數組合成完整網址
        function openPopover(sectionId) {
            var url = "https://catalog.cgu.edu.tw/coursedata?sectionid=" + sectionId;
            window.open(url, "popover", "width=800,height=600,scrollbars=yes,resizable=yes");
        }
    </script>

</body>
</html>
