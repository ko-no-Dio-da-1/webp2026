<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex#6 簡單打字機</title>
    
    <!-- Bootstrap 5（已移除 integrity，避免 Chrome 阻擋） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>
<body class="p-5 bg-light">
    <div class="container">
        <h2 class="mb-4">🐔 簡單打字機（打對就吃掉第一個字！）</h2>
        <p class="lead">打出目前最左邊的字母，就會自動消除它～ 持續打字吧！</p>
        
        <!-- 打字區域 -->
        <div id="container" 
             tabindex="0"
             class="blockquote text-nowrap fs-1 border border-3 border-primary p-4 bg-white rounded-3 shadow-sm"
             style="min-height: 80px; font-family: monospace;">
        </div>
        
        <div class="mt-3 text-muted small">
            Escape → 清空全部　　Backspace → 刪除最後一個字
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
